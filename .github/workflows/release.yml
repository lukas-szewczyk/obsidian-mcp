name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Verify release target
        run: |
          test "$(uname -m)" = "arm64"
          test "$(rustc -vV | sed -n 's/^host: //p')" = "aarch64-apple-darwin"

      - name: Verify tag matches Cargo package version
        run: |
          VERSION="$(awk '
            /^\[package\]$/ { in_package = 1; next }
            /^\[/ { in_package = 0 }
            in_package && /^version = / {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"
          test "${GITHUB_REF_NAME}" = "v${VERSION}"

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PACKAGE="obsidian-mcp-${VERSION}-aarch64-apple-darwin"
          ARCHIVE="${PACKAGE}.tar.gz"

          mkdir "${PACKAGE}"
          cp target/release/obsidian-mcp README.md LICENSE "${PACKAGE}/"
          tar -czf "${ARCHIVE}" "${PACKAGE}"
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="obsidian-mcp-${VERSION}-aarch64-apple-darwin.tar.gz"
          gh release create "${GITHUB_REF_NAME}" \
            "${ARCHIVE}" \
            "${ARCHIVE}.sha256" \
            --generate-notes \
            --title "obsidian-mcp ${GITHUB_REF_NAME}"
